name: build v8 bc

on: 
  workflow_dispatch:
    inputs:
      tag_date:
        description: 'tag date'
        type: string
        default: ""
        required: false
      v8_revision:
        description: 'V8 TAG(Branch) to build'
        type: choice
        options:
        - "9.4.146.24"
        - "10.6.194"
        - "11.8.172"
        default: '9.4.146.24'
        required: true
      wrap_new:
        description: 'wrap new/delete'
        type: choice
        options:
        - "with_new_wrap"
        - ""
        default: ""
        required: false

jobs:        
  build_windows_md_dll:
    if: github.event.inputs.build_windows == 'true'
    name: Windows-MD-DLL
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v2
    - uses: ilammy/msvc-dev-cmd@v1
    - name: Run build script
      shell: cmd
      run: |
        cd %GITHUB_WORKSPACE%
        call npm i
        call .\windows_64MD_DLL_94.cmd ${{github.event.inputs.v8_revision}} ${{github.event.inputs.wrap_new}}
    - name: Rename
      shell: bash
      run: |
        mv ~/v8/v8/output/v8 ~/v8/v8/output/v8_${{github.event.inputs.v8_revision}}
    - uses: actions/upload-artifact@v4
      with:
        name: v8_bin_winx64
        path: ~/v8/v8/output/**/*
        
  build_macos_dll:
    if: github.event.inputs.build_macos == 'true'
    name: macOS-DLL
    runs-on: macos-13
    steps:
    - name: use python3.9
      run: |
        brew install python@3.9
        pip install virtualenv
    - uses: actions/checkout@v2
    - name: Run build script
      run: |
        export PATH=/usr/local/opt/python@3.9/libexec/bin:$PATH
        cd $GITHUB_WORKSPACE
        npm i
        bash ./macos_DLL.sh ${{github.event.inputs.v8_revision}} ${{github.event.inputs.wrap_new}}
        mv ~/v8/v8/output/v8 ~/v8/v8/output/v8_${{github.event.inputs.v8_revision}}
    - uses: actions/upload-artifact@v4
      with:
        name: v8_bin_macx64
        path: ~/v8/v8/output/**/*
